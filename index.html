<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LVPD 10-Codes — QRF</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0c0f;
  --bg2: #0f1318;
  --bg3: #151b22;
  --bg4: #1c2430;
  --border: #1e2d3d;
  --border2: #2a3f55;
  --text: #c8d8e8;
  --text2: #7a96b0;
  --text3: #4a6070;
  --accent: #00c2ff;
  --accent2: #0088cc;
  --red: #ff3b3b;
  --red-bg: rgba(255,59,59,.1);
  --red-border: rgba(255,59,59,.25);
  --amber: #ffaa00;
  --amber-bg: rgba(255,170,0,.08);
  --amber-border: rgba(255,170,0,.2);
  --green: #00e87a;
  --green-bg: rgba(0,232,122,.08);
  --green-border: rgba(0,232,122,.2);
  --mono: 'Share Tech Mono', monospace;
  --cond: 'Barlow Condensed', sans-serif;
  --body: 'Barlow', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Scanline overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px);
  pointer-events: none;
  z-index: 1000;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.badge-shield {
  width: 36px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.badge-shield svg { width: 36px; height: 40px; }

.header-title {
  font-family: var(--cond);
  font-weight: 700;
  font-size: 22px;
  letter-spacing: .08em;
  color: #fff;
  line-height: 1;
}

.header-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
  letter-spacing: .14em;
  margin-top: 3px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.live-dot {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
  letter-spacing: .06em;
}

.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,232,122,.5); }
  50% { opacity: .7; box-shadow: 0 0 0 4px rgba(0,232,122,0); }
}

#clock {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--accent);
  letter-spacing: .1em;
}

/* ── Layout ── */
.layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: calc(100vh - 73px);
}

/* ── Sidebar ── */
aside {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  position: sticky;
  top: 73px;
  height: calc(100vh - 73px);
  overflow-y: auto;
}

.sidebar-label {
  font-family: var(--cond);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .16em;
  color: var(--text3);
  padding: 0 20px 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}

.cat-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 9px 20px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text2);
  font-family: var(--cond);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: .04em;
  text-align: left;
  transition: all .15s;
  position: relative;
}

.cat-btn:hover { background: var(--bg3); color: var(--text); }

.cat-btn.active {
  background: rgba(0,194,255,.07);
  color: var(--accent);
}

.cat-btn.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--accent);
}

.cat-count {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  background: var(--bg4);
  color: var(--text3);
  padding: 1px 6px;
  border-radius: 10px;
  border: 1px solid var(--border);
}

.cat-btn.active .cat-count {
  background: rgba(0,194,255,.15);
  color: var(--accent);
  border-color: rgba(0,194,255,.3);
}

/* ── Main ── */
main {
  padding: 0;
  overflow-y: auto;
}

/* ── Search bar ── */
.search-bar {
  padding: 16px 28px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.search-icon {
  color: var(--text3);
  font-size: 14px;
  flex-shrink: 0;
}

#search {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text);
  letter-spacing: .04em;
}

#search::placeholder { color: var(--text3); }

.search-bar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

#result-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: .06em;
  white-space: nowrap;
}

.filter-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 10px 28px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .08em;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all .15s;
  background: var(--bg3);
  color: var(--text2);
  border-color: var(--border);
}

.pill:hover { border-color: var(--border2); color: var(--text); }

.pill.active-red { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
.pill.active-amber { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-border); }
.pill.active-green { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
.pill.active-all { background: rgba(0,194,255,.08); color: var(--accent); border-color: rgba(0,194,255,.25); }

.pill-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
}

/* ── Codes table ── */
#codes-output {
  padding: 20px 28px 40px;
}

.section {
  margin-bottom: 28px;
  animation: fadeIn .2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.section-title {
  font-family: var(--cond);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .14em;
  color: var(--text3);
  text-transform: uppercase;
}

.section-range {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--border2);
  letter-spacing: .06em;
}

.codes-grid {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.code-row {
  display: grid;
  grid-template-columns: 100px 1fr auto;
  align-items: center;
  gap: 16px;
  padding: 8px 12px;
  border-radius: 4px;
  transition: background .1s;
  cursor: default;
}

.code-row:hover { background: var(--bg3); }

.code-row.pri-red { border-left: 2px solid var(--red); padding-left: 10px; }
.code-row.pri-amber { border-left: 2px solid var(--amber); padding-left: 10px; }
.code-row.pri-green { border-left: 2px solid var(--green); padding-left: 10px; }

.code-num {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--accent);
  letter-spacing: .06em;
  flex-shrink: 0;
}

.code-row.pri-red .code-num { color: var(--red); }
.code-row.pri-amber .code-num { color: var(--amber); }
.code-row.pri-green .code-num { color: var(--green); }

.code-desc {
  font-family: var(--cond);
  font-size: 15px;
  font-weight: 400;
  letter-spacing: .03em;
  color: var(--text);
}

.pri-badge {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .1em;
  padding: 2px 7px;
  border-radius: 2px;
  text-transform: uppercase;
  flex-shrink: 0;
}

.pri-badge.red { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.pri-badge.amber { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
.pri-badge.green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }

.no-results {
  text-align: center;
  padding: 60px 0;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text3);
  letter-spacing: .06em;
}

/* ── Highlight ── */
mark {
  background: rgba(0,194,255,.2);
  color: var(--accent);
  border-radius: 2px;
  padding: 0 1px;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ── Hamburger button (hidden on desktop) ── */
.menu-toggle {
  display: none;
  align-items: center;
  justify-content: center;
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 8px;
  cursor: pointer;
  color: var(--text2);
  gap: 5px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .06em;
  flex-shrink: 0;
}
.menu-toggle svg { width: 16px; height: 16px; }
.menu-toggle:hover { border-color: var(--border2); color: var(--text); }

/* Sidebar drawer overlay */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 200;
}
.sidebar-overlay.open { display: block; }

/* ── Tablet (1024px) ── */
@media (max-width: 1024px) {
  .layout { grid-template-columns: 200px 1fr; }
  .header-sub { display: none; }
}

/* ── Mobile (700px) ── */
@media (max-width: 700px) {
  /* Header */
  header {
    padding: 10px 14px;
    flex-wrap: nowrap;
    gap: 10px;
  }
  .header-title { font-size: 17px; }
  .header-sub { display: none; }
  .badge-shield { width: 28px; height: 32px; }
  .badge-shield svg { width: 28px; height: 32px; }
  .header-left { gap: 10px; }
  .header-right { gap: 8px; flex-shrink: 0; }
  .live-dot span { display: none; }
  #clock { font-size: 11px; }

  /* Hamburger */
  .menu-toggle { display: flex; }

  /* Layout: single column, sidebar becomes drawer */
  .layout { grid-template-columns: 1fr; }

  aside {
    position: fixed;
    top: 0;
    left: -280px;
    width: 260px;
    height: 100dvh;
    z-index: 300;
    padding: 16px 0;
    border-right: 1px solid var(--border2);
    transition: left .25s ease;
    overflow-y: auto;
  }
  aside.open { left: 0; }

  .sidebar-label { display: block; }
  .cat-btn { font-size: 13px; padding: 10px 20px; }
  .cat-btn.active::before { display: block; }
  .cat-count { display: inline-block; }

  /* Main content */
  main { overflow: visible; }

  .search-bar {
    padding: 10px 14px;
    position: sticky;
    top: 0;
    z-index: 50;
    gap: 8px;
  }
  #search { font-size: 13px; }
  #result-count { display: none; }

  .filter-pills {
    padding: 8px 14px 10px;
    gap: 5px;
  }
  .pill { font-size: 9px; padding: 3px 8px; }

  #codes-output { padding: 10px 14px 40px; }

  .section-title { font-size: 10px; }
  .section-range { display: none; }

  /* Code rows: stack vertically on very small screens */
  .code-row {
    grid-template-columns: 78px 1fr;
    grid-template-rows: auto auto;
    gap: 2px 8px;
    padding: 9px 10px;
  }
  .pri-badge {
    grid-column: 2;
    justify-self: start;
    margin-top: 1px;
  }
  .code-num { font-size: 13px; grid-row: 1; }
  .code-desc { font-size: 14px; grid-row: 1; }
}

/* ── Very small screens (360px) ── */
@media (max-width: 380px) {
  .header-title { font-size: 14px; }
  .dot { width: 6px; height: 6px; }
  #clock { font-size: 10px; }
  .code-num { font-size: 12px; }
  .code-desc { font-size: 13px; }
}
</style>
</head>

<header>
  <div class="header-left">

</header>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="layout">

    <div class="sidebar-label">CATEGORIES</div>

    <div class="filter-pills">

      <button class="pill" id="pill-green" onclick="setPriFilter('green')">
        <span class="pill-dot" style="background:var(--green)"></span> CLEAR
      </button>
    </div>

    <div id="codes-output"></div>
  </main>
</div>

    {c:"10-79",d:"Dangerous person",pri:"red"},
    {c:"10-80",d:"Pursuit",pri:"red"},
    {c:"10-80h",d:"High-speed pursuit",pri:"red"},
    {c:"10-80t",d:"Terminate pursuit"},
    {c:"10-81",d:"Reckless driving",pri:"amber"},
    {c:"10-82",d:"Being followed",pri:"amber"},
    {c:"10-83",d:"Street racing",pri:"amber"},
    {c:"10-84",d:"ETA"},
    {c:"10-85",d:"Delay"},
    {c:"10-86",d:"Fight / resisting",pri:"red"},
    {c:"10-87",d:"Stalking",pri:"amber"},
  ]},
  {cat:"Misc / General", range:"10-88 – 10-97", codes:[
    {c:"10-88",d:"Contact info"},
    {c:"10-89",d:"Parking issue"},
    {c:"10-90",d:"Alarm"},
    {c:"10-91",d:"Disturbance"},
    {c:"10-92",d:"Juvenile disturbance"},
    {c:"10-93",d:"Situation resolved",pri:"green"},
    {c:"10-94",d:"Crossing duty"},
    {c:"10-95",d:"Secure area"},
    {c:"10-96",d:"Mental health case"},
    {c:"10-97",d:"En route"},
  ]},
];

let activeCat = 'all';
let activePri = null;

// Build sidebar
const catBtnsEl = document.getElementById('cat-buttons');
document.getElementById('count-all').textContent = DATA.reduce((a,s)=>a+s.codes.length,0);

DATA.forEach(sec => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn';
  btn.dataset.cat = sec.cat;
  btn.innerHTML = `${sec.cat}<span class="cat-count">${sec.codes.length}</span>`;
  btn.onclick = () => setCat(sec.cat);
  catBtnsEl.appendChild(btn);
});

function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  render();
}

function setPriFilter(pri) {
  activePri = pri;
  document.querySelectorAll('.pill').forEach(p => {
    p.className = 'pill';
  });
  if (pri === null) document.getElementById('pill-all').classList.add('active-all');
  else if (pri === 'red') document.getElementById('pill-red').classList.add('active-red');
  else if (pri === 'amber') document.getElementById('pill-amber').classList.add('active-amber');
  else if (pri === 'green') document.getElementById('pill-green').classList.add('active-green');
  render();
}

function hl(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let total = 0;
  let html = '';

  DATA.forEach(sec => {
    if (activeCat !== 'all' && sec.cat !== activeCat) return;
    const rows = sec.codes.filter(r => {
      if (activePri && r.pri !== activePri) return false;
      if (!q) return true;
      return r.c.toLowerCase().includes(q) || r.d.toLowerCase().includes(q);
    });
    if (!rows.length) return;
    total += rows.length;

    html += `<div class="section">
      <div class="section-header">
        <span class="section-title">${sec.cat}</span>
        <span class="section-range">${sec.range}</span>
      </div>
      <div class="codes-grid">`;

    rows.forEach(r => {
      const priClass = r.pri ? ` pri-${r.pri}` : '';
      const badge = r.pri ? `<span class="pri-badge ${r.pri}">${r.pri==='red'?'PRIORITY':r.pri==='amber'?'CAUTION':'CLEAR'}</span>` : '';
      html += `<div class="code-row${priClass}">
        <span class="code-num">${hl(r.c, q)}</span>
        <span class="code-desc">${hl(r.d, q)}</span>
        ${badge}
      </div>`;
    });

    html += `</div></div>`;
  });

  if (!html) html = `<div class="no-results">[ NO CODES MATCH QUERY ]</div>`;

  document.getElementById('codes-output').innerHTML = html;
  document.getElementById('result-count').textContent = `${total} CODE${total !== 1 ? 'S' : ''}`;
}

document.getElementById('search').addEventListener('input', render);

// Clock
function tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    [now.getHours(), now.getMinutes(), now.getSeconds()]
      .map(n => String(n).padStart(2, '0')).join(':');
}
tick();
setInterval(tick, 1000);

// Init
setPriFilter(null);
render();

// Mobile sidebar drawer
const menuToggle = document.getElementById('menu-toggle');
const sidebar = document.querySelector('aside');
const overlay = document.getElementById('sidebar-overlay');

function openSidebar() {
  sidebar.classList.add('open');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  sidebar.classList.remove('open');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

menuToggle.addEventListener('click', () => {
  sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
});
overlay.addEventListener('click', closeSidebar);

// Patch setCat to close drawer on mobile
const _origSetCat = setCat;
setCat = function(cat) {
  _origSetCat(cat);
  if (window.innerWidth <= 700) closeSidebar();
};
</script>
</body>
</html>
